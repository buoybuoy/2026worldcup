name: Update World Cup Scores

on:
  schedule:
    # Run every 5 minutes, 9am–11pm PT (4pm–6am UTC)
    - cron: '*/5 16-23 * * *'
    - cron: '*/5 0-6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tzdata

      - name: Fetch and update scores
        run: python scripts/update_scores.py

      - name: Commit and push if changed
        run: |
          git config user.name "World Cup Bot"
          git config user.email "bot@github.com"
          git diff --quiet index.html || (
            git add index.html &&
            git commit -m "Auto-update scores [$(date -u '+%Y-%m-%d %H:%M UTC')]" &&
            git push
          )
